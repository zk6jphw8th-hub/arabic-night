<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Study Journey</title>

<style>
body{
margin:0;
font-family:Arial;
background:#050814;
color:white;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
overflow:hidden;
}

.card{
width:92%;
max-width:450px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(12px);
padding:25px;
border-radius:20px;
text-align:center;
position:relative;
z-index:2;
}

.progress{
width:100%;
height:10px;
background:rgba(255,255,255,0.1);
border-radius:10px;
overflow:hidden;
margin:15px 0;
}

.bar{
height:100%;
width:0%;
background:white;
transition:1s;
}

button{
padding:10px 14px;
border:none;
border-radius:10px;
cursor:pointer;
margin:5px;
}

.locked{
opacity:0.4;
cursor:not-allowed;
}

.timer{
font-size:12px;
opacity:0.7;
margin-top:5px;
}
</style>
</head>

<body>

<div class="card">

<h2>📖 Study Journey</h2>

<div class="progress">
<div class="bar" id="bar"></div>
</div>

<div id="buttons"></div>

<div id="content"></div>

</div>

<script>

const chapters = [
{
name:"Arabic",
text:`I know this period has been really hard on you.

We had ups and downs, arguments, and a lot of stress…
but you still kept going.`,
unlock:"2026-06-27T19:00"
},
{
name:"Chemistry",
text:`I know chemistry can feel confusing sometimes…

But you always tried again.`,
unlock:"2026-07-01T19:00"
},
{
name:"English",
text:`I know things weren’t always easy between us…

But you didn’t give up.`,
unlock:"2026-07-04T19:00"
},
{
name:"Physics",
text:`Not everything makes sense right away…

But you kept going anyway.`,
unlock:"2026-07-08T19:00"
},
{
name:"Biology",
text:`This is the last one…

You made it through everything.`,
unlock:"2026-07-15T19:00"
}
];

function now(){
return new Date();
}

function isUnlocked(ch){
return now() >= new Date(ch.unlock);
}

function getRemaining(time){
let diff = new Date(time) - new Date();
if(diff <= 0) return "Open now";
let h = Math.floor(diff/1000/60/60);
let m = Math.floor(diff/1000/60)%60;
let s = Math.floor(diff/1000)%60;
return `${h}h ${m}m ${s}s`;
}

const bar = document.getElementById("bar");
const buttons = document.getElementById("buttons");
const content = document.getElementById("content");

function render(){

buttons.innerHTML="";

chapters.forEach((c,i)=>{

let btn = document.createElement("button");
btn.innerText = c.name;

let timer = document.createElement("div");
timer.className="timer";

if(isUnlocked(c)){
btn.onclick = ()=>show(i);
timer.innerText = "Open now";
}else{
btn.disabled = true;
btn.classList.add("locked");
timer.innerText = "Opens in: " + getRemaining(c.unlock);
}

buttons.appendChild(btn);
buttons.appendChild(timer);

});

updateProgress();
}

function show(i){
content.innerText = chapters[i].text;
}

function updateProgress(){
let unlocked = chapters.filter(c=>isUnlocked(c)).length;
bar.style.width = (unlocked/chapters.length)*100 + "%";
}

setInterval(()=>{
render();
},1000);

render();
updateProgress();

</script>

</body>
</html>
